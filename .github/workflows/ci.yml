name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore TachoGraphStudio.slnx

      - name: Format check
        run: dotnet format TachoGraphStudio.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build TachoGraphStudio.slnx -c Release -p:Platform=x64 --no-restore

      - name: Test (Core)
        run: dotnet test tests/TachoGraphStudio.Core.Tests -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Test (App)
        run: dotnet test tests/TachoGraphStudio.App.Tests -c Release --no-restore --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage

      - name: Run PowerShell Tests
        shell: pwsh
        run: |
          $result = Invoke-Pester -Path tests/Install-TachoGraphStudio.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
