name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - uses: microsoft/setup-msbuild@v2

      - name: Resolve version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "タグは v<major>.<minor>.<patch> 形式であること: $tag"
          }
          "version=$($tag.TrimStart('v')).0" >> $env:GITHUB_OUTPUT

      - name: Set package version in Package.appxmanifest
        shell: pwsh
        run: |
          $path = "src/TachoGraphStudio.App/Package.appxmanifest"
          [xml]$manifest = Get-Content $path -Raw
          $manifest.Package.Identity.Version = "${{ steps.version.outputs.version }}"
          $manifest.Save((Resolve-Path $path))

      - name: Restore signing certificate
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
        run: |
          if (-not $env:SIGNING_CERTIFICATE_BASE64) {
            throw "Secret SIGNING_CERTIFICATE_BASE64 が未設定です（scripts/New-SigningCertificate.ps1 参照）"
          }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\signing.pfx",
            [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64))

      - name: Build MSIX (unsigned)
        shell: pwsh
        run: |
          msbuild src/TachoGraphStudio.App/TachoGraphStudio.App.csproj `
            -restore -t:Build -p:Configuration=Release -p:Platform=x64 `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackageDir="$env:RUNNER_TEMP\appx\"

      - name: Sign MSIX and collect release artifacts
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory dist | Out-Null

          # self-contained のため依存ランタイム msix は生成されないが、App パッケージのみを明示的に選ぶ
          $msix = Get-ChildItem "$env:RUNNER_TEMP\appx" -Recurse -Filter "TachoGraphStudio.App_*_x64.msix" |
            Where-Object { $_.DirectoryName -notmatch "Dependencies" } | Select-Object -First 1
          if (-not $msix) { throw "MSIX パッケージが生成されていません" }
          Copy-Item $msix.FullName dist/TachoGraphStudio_x64.msix

          $signtool = Get-ChildItem "$env:USERPROFILE\.nuget\packages\microsoft.windows.sdk.buildtools\*\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          if (-not $signtool) { throw "signtool.exe が NuGet キャッシュに見つかりません" }
          & $signtool.FullName sign /fd SHA256 /f "$env:RUNNER_TEMP\signing.pfx" `
            /p $env:SIGNING_CERTIFICATE_PASSWORD dist/TachoGraphStudio_x64.msix
          if ($LASTEXITCODE -ne 0) { throw "signtool による署名に失敗しました" }

          $sig = Get-AuthenticodeSignature dist/TachoGraphStudio_x64.msix
          if (-not $sig.SignerCertificate) { throw "MSIX が署名されていません" }

          $pfx = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            "$env:RUNNER_TEMP\signing.pfx", $env:SIGNING_CERTIFICATE_PASSWORD)
          [IO.File]::WriteAllBytes("$PWD/dist/TachoGraphStudio.cer", $pfx.Export("Cert"))

          $appinstaller = (Get-Content distribution/TachoGraphStudio.appinstaller.template -Raw).
            Replace("{VERSION}", "${{ steps.version.outputs.version }}").
            Replace("{TAG}", "${{ github.ref_name }}")
          Set-Content dist/TachoGraphStudio.appinstaller $appinstaller -NoNewline

          Copy-Item scripts/Install-TachoGraphStudio.ps1 dist/

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = Get-ChildItem dist | ForEach-Object FullName
          gh release create "${{ github.ref_name }}" @files `
            --title "${{ github.ref_name }}" --generate-notes
